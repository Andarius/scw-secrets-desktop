name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.3"

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            tag="${tag#refs/tags/}"
            if [[ "${tag}" != v* ]]; then
              tag="v${tag}"
            fi
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Release tag is required" >&2
            exit 1
          fi

          git fetch --tags --force
          git rev-parse "${tag}^{commit}" >/dev/null
          echo "value=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout release tag
        run: git checkout "${{ steps.tag.outputs.value }}"

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          expected_tag="v$(bun -e 'import { readFileSync } from "node:fs"; const pkg = JSON.parse(readFileSync("package.json", "utf8")); console.log(pkg.version);')"
          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            echo "Tag ${RELEASE_TAG} does not match package.json version ${expected_tag}" >&2
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists"
          else
            gh release create "${RELEASE_TAG}" --repo "${GH_REPO}" --draft --generate-notes --title "${RELEASE_TAG}"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
          - runner: windows-latest
            target: win-x64
          - runner: macos-latest
            target: macos-arm64
          - runner: macos-15-intel
            target: macos-x64
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build stable artifacts
        run: bun run build:stable

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: bun run ./scripts/upload-release-assets.ts

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-artifacts-${{ matrix.target }}
          path: artifacts
          if-no-files-found: ignore

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "${RELEASE_TAG}" --repo "${GH_REPO}" --draft=false
